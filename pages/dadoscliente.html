<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Detalhes da Locação</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style-dados.css"/>
  <style>     
    body {
      font-family: Poppins, sans-serif;
      background: #C6C7C9;
      padding: 20px;
    }
  </style>
</head>

<body><!--PAGINA Para mostrar O usuario os detalhes da sua locação após o cadastro e login-->
  <div class="container">
    <h1>Detalhes do Veículo e Locação</h1>
    <div id="detalhes"></div>
    <button onclick="voltar()">Voltar para Login</button>
  </div>

  <script>
   let cliente = JSON.parse(sessionStorage.getItem('clienteLogado'));
    if (!cliente) {
      document.getElementById('detalhes').innerHTML = '<p>O Usuário não está logado.</p>';
    } else {
     let detalhesDiv = document.getElementById('detalhes');

      // Imagens reais de veículos
     let imagensVeiculos = {
        "Jeep Renegade": "https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1200&q=80",
        "Corolla Cross": "https://quatrorodas.abril.com.br/wp-content/uploads/2024/04/XRX-Hybrid_C.Cross_2025_2-1.jpg?quality=70&strip=info&w=1280&h=720&crop=1",
        "T-Cross": "https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1200&q=80",
        "Volvo XC60": "https://cdn.motor1.com/images/mgl/0e7LGp/s3/volvo-xc60-2024.webp",
        "Gol": "https://images.unsplash.com/photo-1502877338535-766e1452684a?auto=format&fit=crop&w=1200&q=80",
        "Fiat Palio": "https://tribunadonorte.com.br/wp-content/uploads/2023/07/84965.jpg",
        "Siena": "https://production.autoforce.com/uploads/version/profile_image/4482/comprar-attractive-1-4_bf02c9c6c3.png",
        "Ford Ka": "https://img2.icarros.com/dbimg/galeriaimgmodelo/1/133902_1.webp",
        "Renault Kwid": "https://s2.glbimg.com/eaTJV7tLOellWlLRozE9QlidATI=/fit-in/940x590/e.glbimg.com/og/ed/f/original/2017/06/12/renault-kwid-dianteira.jpg",
        "Fiat Mobi": "https://production.autoforce.com/uploads/version/profile_image/10921/model_main_webp_comprar-like-1-0_9eee82ebb4.png.webp"
      };

      detalhesDiv.innerHTML = `
        <div class="detalhes-grid">
          <div class="detalhes-texto">
            <div class="detalhe-item">
              <strong>Locador</strong>
              <span>${cliente.nome}</span>
            </div>
            <div class="detalhe-item">
              <strong>CPF do Locador</strong>
              <span>${cliente.cpf}</span>
            </div>
            <div class="detalhe-item">
              <strong>Placa</strong>
              <span>${cliente.placa}</span>
            </div>
            <div class="detalhe-item">
              <strong>Tipo do Seguro</strong>
              <span>${cliente.cor}</span>
            </div>
            <div class="detalhe-item">
              <strong>Categoria</strong>
              <span>${cliente.categoria}</span>
            </div>
            <div class="detalhe-item">
              <strong>Modelo</strong>
              <span>${cliente.modelo}</span>
            </div>
            <div class="detalhe-item">
              <strong>UF</strong>
              <span>${cliente.uf}</span>
            </div>
            <div class="detalhe-item">
              <strong>Acessórios Adicionais</strong>
              <span>${cliente.acessoriosAdds}</span>
            </div>
            <div class="detalhe-item">
              <strong>Data Retirada</strong>
              <span>${cliente.dataRetirada}</span>
            </div>
            <div class="detalhe-item">
              <strong>Data Devolução</strong>
              <span>${cliente.dataDevolucao}</span>
            </div>
          </div>

          <div class="detalhes-imagem">
            <img class="veiculo-imagem" src="${imagensVeiculos[cliente.modelo] || ''}" alt="Imagem do veículo ${cliente.modelo}" loading="lazy" />
          </div>
        </div>
      `;
    }

    function voltar() {
      sessionStorage.removeItem('clienteLogado');
      window.location.href = 'locterCars.html'; //linkado com o comando window para redirecionar a pagina do cadastro
    }
  </script>

</body>

</html>
